<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Wheels/Tires at the bottom -->
  <rect x="9" y="38" width="8" height="8" rx="2" fill="#111827" />
  <rect x="31" y="38" width="8" height="8" rx="2" fill="#111827" />
  
  <!-- Main Yellow Bus Body -->
  <rect x="6" y="6" width="36" height="32" rx="6" fill="#F59E0B" />
  
  <!-- Under Carriage Dark Boarder -->
  <rect x="4" y="34" width="40" height="4" rx="1" fill="#1F2937" />
  
  <!-- Windshield Glass -->
  <rect x="9" y="10" width="30" height="12" rx="2" fill="#93C5FD" />
  
  <!-- Center division of windshield -->
  <rect x="23" y="10" width="2" height="12" fill="#1E40AF" />
  
  <!-- Shiny Headlights -->
  <circle cx="12" cy="28" r="3.5" fill="#FFF59D" />
  <circle cx="12" cy="28" r="2" fill="#FFFFFF" />
  <circle cx="36" cy="28" r="3.5" fill="#FFF59D" />
  <circle cx="36" cy="28" r="2" fill="#FFFFFF" />
  
  <!-- Front Grill -->
  <rect x="18" y="27" width="12" height="5" rx="1.5" fill="#374151" />
  <line x1="21" y1="29.5" x2="27" y2="29.5" stroke="#9CA3AF" stroke-width="1" />
  
  <!-- Warning Lights on Top -->
  <circle cx="14" cy="4" r="2" fill="#EF4444" />
  <circle cx="34" cy="4" r="2" fill="#EF4444" />
</svg>